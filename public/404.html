<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Estuday</title>
    <script type="text/javascript">
      // Mantém até "/Estuday" no caminho
      var pathSegmentsToKeep = 2; 
      var l = window.location;
      var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      l.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
