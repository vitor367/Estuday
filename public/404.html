<!DOCTYPE html>
<html>
<head>
<script>
var repo = window.location.pathname.split('/')[1];
var path = window.location.pathname.replace('/' + repo, '');
if (path && path !== '/') {
 window.location.replace('/' + repo + '/#' + path);
} else {
 window.location.replace('/' + repo + '/');
}
</script>
</head>
<body></body>
</html>
